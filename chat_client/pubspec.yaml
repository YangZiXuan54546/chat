name: chat_client
description: "Cross-platform chat application with private messages, group chat, and voice/video calls."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State Management
  flutter_riverpod: ^2.6.1

  # Routing
  go_router: ^14.8.1

  # Networking
  dio: ^5.8.0+1
  web_socket_channel: ^3.0.2

  # WebRTC for voice/video calls
  flutter_webrtc: ^0.12.12

  # Image handling
  cached_network_image: ^3.4.1
  image_picker: ^1.1.2

  # Local storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Utilities
  uuid: ^4.5.1
  intl: ^0.20.2
  equatable: ^2.0.7
  json_annotation: ^4.9.0
  path_provider: ^2.1.5
  file_picker: ^8.1.7
  permission_handler: ^11.4.0

  # UI Components
  shimmer: ^3.0.0
  photo_view: ^0.15.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.15
  json_serializable: ^6.9.5

flutter:
  uses-material-design: true

  assets:
    - assets/images/
